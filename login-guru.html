<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CBT SMA ICH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card card">
            <div class="login-header">
                <img src="logo-smaich.png" alt="Logo SMAICH" class="school-logo main-logo">
                <h2>PORTAL GURU SMAICH</h2>
                <p>SMA ISLAM CIKAL HARAPAN I BSD</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="input-group">
                    <label>Nomor Peserta / Username</label>
                    <input type="text" id="username" class="input-text" placeholder="Contoh: 242501001" required>
                </div>
                
                <div class="input-group">
                    <label>Password / PIN</label>
                    <input type="password" id="password" class="input-text" placeholder="Masukkan password Anda" required>
                </div>

                <button type="submit" class="btn-3d btn-next btn-login">MASUK KE UJIAN</button>
                
                <div class="register-box">
                    Belum punya akun? <a href="registrasi.html" class="register-link">Daftar di sini</a>
                </div>
            </form>
            
            <div class="login-footer">
                &copy; 2026 IT Support SMAICH. All rights reserved.
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>
</html>
