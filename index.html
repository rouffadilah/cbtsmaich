<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal CBT SMA ICH - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-page-bg">

    <div class="login-container">
        <div class="login-card">
            
            <div class="login-header">
                <img src="logo-smaich.png" alt="Logo SMAICH" class="main-logo">
                <h2 id="portal-title">CBT SMAICH</h2>
                <p>SMA ISLAM CIKAL HARAPAN I BSD</p>
            </div>

            <form id="login-form">
                <div class="input-group">
                    <label for="login-role"><i class="fas fa-user-tag"></i> Masuk Sebagai</label>
                    <select id="login-role" class="input-text" required>
                        <option value="siswa">Siswa (Ikut Ujian)</option>
                        <option value="guru">Guru (Panel Kontrol)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="username"><i class="fas fa-id-card"></i> Nomor Peserta / Username</label>
                    <input type="text" id="username" class="input-text" placeholder="Contoh: 242501001" required>
                </div>
                
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Password / PIN</label>
                    <input type="password" id="password" class="input-text" placeholder="Masukkan password" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox"> Ingat Saya
                    </label>
                    <a href="#">Lupa Password?</a>
                </div>
                
                <button type="submit" id="btn-submit" class="btn-3d">MASUK KE UJIAN</button>
                
                <div style="margin-top: 20px; font-size: 0.9rem;">
                    Belum punya akun? <a href="registrasi.html">Daftar di sini</a>
                </div>
            </form>
            
            <div class="login-footer">
                &copy; 2026 IT Support SMAICH.<br>All rights reserved.
            </div>
            
        </div>
    </div>

    <script type="module" src="index.js"></script>
</body>
</html>
