<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - CBT SMA ICH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card card">
            <div class="login-header">
                <img src="logo-smaich.png" alt="Logo SMAICH" class="school-logo main-logo">
                <h2>REGISTRASI CBT</h2>
                <p>SMA ISLAM CIKAL HARAPAN I BSD</p>
            </div>

            <form id="register-form" class="login-form">
                <div class="input-group">
                    <label>Nama Lengkap</label>
                    <input type="text" id="reg-name" class="input-text" placeholder="Masukkan nama lengkap" required>
                </div>

                <div class="input-group">
                    <label>Nomor Peserta / NIS</label>
                    <input type="text" id="reg-username" class="input-text" placeholder="Gunakan sebagai Username saat login" required>
                </div>
                
                <div class="input-group">
                    <label>Password / PIN</label>
                    <input type="password" id="reg-password" class="input-text" placeholder="Buat password baru" required>
                </div>

                <div class="input-group">
                    <label>Konfirmasi Password</label>
                    <input type="password" id="reg-confirm-password" class="input-text" placeholder="Ketik ulang password" required>
                </div>

                <button type="submit" class="btn-3d btn-next btn-login">DAFTAR SEKARANG</button>
                
                <div class="register-box">
                    Sudah punya akun? <a href="index.html" class="register-link">Masuk di sini</a>
                </div>
            </form>
            
            <div class="login-footer">
                &copy; 2026 IT Support SMAICH. All rights reserved.
            </div>
        </div>
    </div>

    <script type="module" src="registrasi.js"></script>
</body>
</html>
