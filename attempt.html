<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Berbasis Komputer - SMAICH</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="exam-page">

    <header class="cbt-header">
        <div class="header-left">
            <img src="logo-smaich.png" alt="Logo SMAICH" class="cbt-logo">
            <div class="school-info-header">
                <h1>CBT SMAICH</h1>
                <p>SMA Islam Cikal Harapan I BSD</p>
            </div>
        </div>
        <div class="header-right">
            <div class="user-info-exam">
                <div class="user-text">
                    <span class="user-label">Peserta:</span>
                    <span class="user-name" id="student-name">Memuat Nama...</span>
                </div>
                <i class="fas fa-user-circle fa-2x"></i>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="exam-layout">
            
            <section class="question-section">
                <div class="card question-card">
                    <div class="question-header">
                        <span class="q-number-label">SOAL NOMOR</span>
                        <div class="q-number-badge" id="current-q-num">1</div>
                    </div>
                    
                    <div class="question-content" id="q-container">
                        <div class="loading-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Memuat soal...</p>
                        </div>
                    </div>

                    <div class="nav-controls">
                        <button class="nav-btn btn-prev" id="prev-btn">
                            <i class="fas fa-chevron-left"></i> SEBELUMNYA
                        </button>
                        <button class="nav-btn btn-doubt" id="doubt-btn">
                            <i class="far fa-flag"></i> RAGU-RAGU
                        </button>
                        <button class="nav-btn btn-next" id="next-btn">
                            SELANJUTNYA <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </section>

            <aside class="sidebar-panel">
                <div class="timer-card card">
                    <h3><i class="far fa-clock"></i> SISA WAKTU</h3>
                    <div class="time-display" id="timer">00:00:00</div>
                </div>

                <div class="navigation-card card">
                    <h3><i class="fas fa-th"></i> NAVIGASI SOAL</h3>
                    <div class="q-grid" id="q-grid">
                        </div>
                    
                    <div class="legend-container">
                        <div class="leg-item"><span class="leg-box answered"></span> Terjawab</div>
                        <div class="leg-item"><span class="leg-box doubt"></span> Ragu-Ragu</div>
                        <div class="leg-item"><span class="leg-box active-q"></span> Sedang Dibuka</div>
                    </div>
                </div>

                <button class="btn-finish-exam" id="finish-btn">
                    <i class="fas fa-check-double"></i> SELESAI UJIAN
                </button>
            </aside>

        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
