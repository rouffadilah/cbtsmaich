<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Berbasis Komputer - SMAICH</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="app-header">
        <div class="school-info">
            <img src="logo-smaich.png" alt="Logo SMAICH" class="main-logo" style="height: 40px; margin-bottom: 0;">
            <div>
                <h1>CBT SMAICH</h1>
                <p style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">SMA Islam Cikal Harapan I BSD</p>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="text-align: right;">
                <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">Peserta</span>
                <span class="user-name" id="student-name" style="font-weight: 700; display: block;">Memuat Nama...</span>
            </div>
            <i class="fas fa-user-circle fa-2x" style="color: var(--primary);"></i>
        </div>
    </header>

    <main class="exam-layout">
        <section class="question-section">
            <div class="card question-card">
                <div class="question-header">
                    <span class="q-number-label">SOAL NOMOR</span>
                    <div class="q-number-badge" id="current-q-num">1</div>
                </div>
                
                <div class="question-content" id="q-container">
                    <div style="text-align: center; color: var(--text-muted); padding: 50px 0;">
                        <i class="fas fa-spinner fa-spin fa-2x" style="margin-bottom: 10px;"></i>
                        <p>Memuat soal...</p>
                    </div>
                </div>

                <div class="nav-controls">
                    <button class="nav-btn btn-prev" id="prev-btn"><i class="fas fa-chevron-left"></i> SEBELUMNYA</button>
                    <button class="nav-btn btn-doubt" id="doubt-btn"><i class="far fa-flag"></i> RAGU-RAGU</button>
                    <button class="nav-btn btn-next" id="next-btn">SELANJUTNYA <i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </section>

        <aside class="sidebar-panel">
            <div class="card timer-card">
                <h3><i class="far fa-clock"></i> SISA WAKTU</h3>
                <div class="time-display" id="timer">01:30:00</div>
            </div>

            <div class="card navigation-card">
                <h3 style="font-size: 0.9rem; color: var(--text-muted); text-align: center;"><i class="fas fa-th"></i> NAVIGASI SOAL</h3>
                
                <div class="q-grid" id="q-grid">
                    <div class="q-box answered">1</div>
                    <div class="q-box active-q">2</div>
                    <div class="q-box doubt">3</div>
                    <div class="q-box">4</div>
                    <div class="q-box">5</div>
                </div>
                
                <div class="legend-container">
                    <div class="leg-item"><span class="leg-box answered"></span> Terjawab</div>
                    <div class="leg-item"><span class="leg-box doubt"></span> Ragu-Ragu</div>
                    <div class="leg-item"><span class="leg-box active-q" style="border: 2px solid var(--info); background: transparent;"></span> Sedang Dibuka</div>
                </div>
            </div>

            <button class="btn-finish-exam" id="finish-btn">
                <i class="fas fa-check-double"></i> SELESAI UJIAN
            </button>
        </aside>
    </main>

    <script type="module" src="attempt.js"></script>
</body>
</html>
